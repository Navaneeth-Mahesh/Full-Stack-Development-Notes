<!DOCTYPE html>      <!-- Every HTML document should start with the DOCTYPE declaration -->
<html>
<head>
    <!-- The head section contains information about the webpage.
         It is used to link CSS files, add metadata, set the page title,
         and include external resources. -->
</head>
<body>
    <!-- The body contains everything that is visible on the webpage. -->
    <h1>HTML PRACTICE</h1>
    <p>This is the practice section area.</p>
    <!-- The <a> (anchor) tag is used to create hyperlinks. -->
    <a href="https://portfolio-six-sooty-cskt3wx5g5.vercel.app/">
        This is my portfolio
    </a>
    <br><br>
    <!-- The <img> tag is used to display an image.
         src  -> Path of the image.
         alt  -> Alternative text shown if the image cannot be loaded.
         width  -> Image width.
         height -> Image height.
    -->
    <img src="images/fire.jpg" alt="Fire" width="736" height="736">
</body>
</html>

<!--
## Explanation

* `<!DOCTYPE html>` – Tells the browser that this document uses HTML5.
* `<html>` – The root element of the HTML document.
* `<head>` – Stores information about the webpage that is not directly displayed.
* `<body>` – Contains all the visible content of the webpage.
* `<h1>` – Creates the largest heading.
* `<p>` – Creates a paragraph.
* `<a>` – Creates a clickable hyperlink using the `href` attribute.
* `<img>` – Displays an image.

  * `src` → Image location.
  * `alt` → Alternative text if the image is missing.
  * `width` → Sets the image width.
  * `height` → Sets the image height.

**Note:** Your original code was missing the closing `>` for the `<img>` tag. The correct syntax is:

```html
<img src="images/fire.jpg" alt="Fire" width="736" height="736">
```
-->
