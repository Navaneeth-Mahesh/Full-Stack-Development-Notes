<html>
    <body>
        <script>
            //ADDITION OPERATORS
           x = 5 
           y = 10
           x1 = x + y;
           document.write("addition :" + x1 + "<br>");
           x2 = x - y;
           document.write("sub : " + x2 + "<br>");
           x3 = x * y;
           document.write("Mult :" + x3 + "<br>");
           x4 = x / y;
           document.write("division :" + x4 + "<br>");
           x5 = x % y;
           document.write("modulas :" + x5 + "<br>");
        </script>
    </body>
</html>
