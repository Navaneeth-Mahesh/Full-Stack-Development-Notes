<html>
    <body>
        <script>
            var d = new Date();
            theDay = d.getDate();
            switch (theDay)
            {
                case 1 : document.write("Finaly Monday");
                break;
                case 2 : document.write("Finally tuesday");
                break;
                case 3 : document.write("Finally Wed"); 
                break;
                case 4 : document.write("finally thursday"); 
                break;
                case 5 : document.write("finally Friday"); 
                break;
                case 6 : document.write("Finally Saturday"); 
                break;
                case 7 : document.write("Finally Sunday"); 
                break;
                default :
                document.write("waiting for next week");
             }
        </script>
    </body>
</html>
